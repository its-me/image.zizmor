name: Build test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      version:
        description: 'zizmor version number'
        required: false

jobs:
  resolve-version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Resolve version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ github.event.inputs.version }}"
          if [ -z "$version" ]; then
            version=$(gh api repos/woodruffw/zizmor/releases/latest --jq '.tag_name' | sed 's/^v//')
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

  build:
    name: Build image (${{ matrix.platform }})
    runs-on: ubuntu-latest
    needs: resolve-version
    strategy:
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
          - linux/ppc64le
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: false
          build-args: ZIZMOR_VERSION=${{ needs.resolve-version.outputs.version }}
