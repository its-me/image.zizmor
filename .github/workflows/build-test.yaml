name: Build test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      version:
        description: 'zizmor version number'
        required: false

jobs:
  build:
    name: Build image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Resolve version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ github.event.inputs.version }}"
          if [ -z "$version" ]; then
            version=$(gh api repos/woodruffw/zizmor/releases/latest --jq '.tag_name' | sed 's/^v//')
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          command: >-
            docker buildx build
            --build-arg ZIZMOR_VERSION=${{ steps.version.outputs.version }}
            .
